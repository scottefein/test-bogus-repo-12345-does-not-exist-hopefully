repo: scottefein/sef-industries-manager
branch: master
sync:
  agents:
    enabled: true
    include: all
    exclude: []
setup:
  enabled: true
  plugins:
  - name: vercel
    config:
      framework: nextjs
      build_command: npm run build
      output_directory: .next
  - name: clerk
    config:
      set_vercel_env: true
      allowed_origins:
      - https://$REPO_NAME.vercel.app
      - http://localhost:3000
