# Per-repo sync configuration for sef-industries-team
#
# File naming: repos/<owner>--<repo>.yml (double-dash separates owner from repo)
# Example: repos/scottefein--my-app.yml
#
# This file is a documented schema reference. Copy it to create configs for real repos.

repo: owner/repo-name              # GitHub owner/repo (required)
branch: main                       # Base branch for PRs (default: main)

sync:
  agents:
    enabled: true                   # Whether to sync agents at all
    include: all                    # "all" or explicit list: [product-manager, uat-reviewer]
    exclude: []                     # Skip specific agents (overrides include: all)

  # Future categories (disabled by default until we have content):
  # skills:
  #   enabled: false
  #   include: all
  #   exclude: []
  # commands:
  #   enabled: false
  #   include: all
  #   exclude: []

# Post-creation setup (runs once via GitHub Actions after template cleanup)
# Requires: GCP Workload Identity Federation, org-setup-secrets in Secret Manager
#
# Plugin execution order matters — vercel should run before supabase/clerk
# so that VERCEL_PROJECT_ID is available for setting env vars.
setup:
  enabled: true                     # Master switch for post-creation setup
  plugins:
    - name: vercel                  # Creates Vercel project and links to repo
      config:
        framework: nextjs           # Vercel framework preset
        build_command: "npm run build"
        output_directory: ".next"

    - name: supabase                # Creates Supabase project, sets keys + Vercel env vars
      config:
        organization_id: "jguexrbnnjbdispvbrgf"  # Supabase org ID
        region: us-east-1           # Project region
        set_vercel_env: true        # Also set keys as Vercel env vars

    - name: clerk                   # Sets Clerk auth keys + Vercel env vars
      config:
        set_vercel_env: true        # Also set keys as Vercel env vars
        allowed_origins:            # Origins to allow ($REPO_NAME gets substituted)
          - "https://$REPO_NAME.vercel.app"
          - "http://localhost:3000"

    - name: resend                  # Sets Resend API key (defaults to emails.sefindustries.com)
      config:
        domain: emails.sefindustries.com  # Sending domain
        set_vercel_env: true        # Also set keys as Vercel env vars
        # To use a project-specific domain, add RESEND_API_KEY_OVERRIDE
        # to the GCP secret JSON with the key for that domain
