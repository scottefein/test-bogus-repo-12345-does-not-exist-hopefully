name: Post-Creation Setup

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/setup/.trigger'

permissions:
  contents: write
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for setup directory
        id: check
        run: |
          if [[ ! -d .github/setup ]]; then
            echo "::notice::No .github/setup/ directory found. Exiting."
            echo "has_setup=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_setup=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve config
        if: steps.check.outputs.has_setup == 'true'
        id: config
        env:
          SETUP_CONFIG_VAR: ${{ vars.SETUP_CONFIG }}
        run: |
          if [[ -n "$SETUP_CONFIG_VAR" ]]; then
            echo "source=variable" >> "$GITHUB_OUTPUT"
          elif [[ -f .github/setup/setup.json ]]; then
            echo "source=file" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No setup config found (checked SETUP_CONFIG variable and .github/setup/setup.json)"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: steps.check.outputs.has_setup == 'true'
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch secrets from Google Secret Manager
        if: steps.check.outputs.has_setup == 'true'
        id: secrets
        run: |
          SECRETS="$(gcloud secrets versions access latest \
            --secret=org-setup-secrets \
            --project=scotts-personal)"
          # Store in a file to avoid shell escaping issues
          echo "$SECRETS" > "$RUNNER_TEMP/secrets.json"

      - name: Extract PAT from secrets
        if: steps.check.outputs.has_setup == 'true'
        id: pat
        run: |
          PAT="$(jq -r '.GITHUB_PAT // empty' "$RUNNER_TEMP/secrets.json")"
          if [[ -n "$PAT" ]]; then
            echo "::add-mask::$PAT"
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
            echo "token=$PAT" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run setup plugins
        if: steps.check.outputs.has_setup == 'true'
        env:
          GH_TOKEN: ${{ steps.pat.outputs.has_pat == 'true' && steps.pat.outputs.token || secrets.GITHUB_TOKEN }}
          SETUP_CONFIG_VAR: ${{ vars.SETUP_CONFIG }}
        run: |
          # Resolve SETUP_CONFIG
          if [[ "${{ steps.config.outputs.source }}" == "variable" ]]; then
            export SETUP_CONFIG="$SETUP_CONFIG_VAR"
          else
            export SETUP_CONFIG="$(cat .github/setup/setup.json)"
          fi

          export SECRETS="$(cat "$RUNNER_TEMP/secrets.json")"
          rm -f "$RUNNER_TEMP/secrets.json"

          chmod +x .github/setup/run-setup.sh
          .github/setup/run-setup.sh

      - name: Self-clean setup files
        if: steps.check.outputs.has_setup == 'true'
        env:
          GH_TOKEN: ${{ steps.pat.outputs.has_pat == 'true' && steps.pat.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          rm -rf .github/setup/
          rm -f .github/workflows/repo-setup.yml
          rm -f gha-creds-*.json

      - name: Commit cleanup
        if: steps.check.outputs.has_setup == 'true'
        env:
          GH_TOKEN: ${{ steps.pat.outputs.has_pat == 'true' && steps.pat.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: post-creation setup complete

          Ran setup plugins and cleaned up setup files.
          This repo is now fully configured."
          git push
